<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DamWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f4f8;
            color: #1e293b;
        }

        .transition-all-300 {
            transition: all 0.3s ease-in-out;
        }

        .hover-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .nav-btn.active {
            background-color: #0ea5e9;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.4);
        }

        .modal-enter {
            animation: modalFadeIn 0.3s ease-out forwards;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0ea5e9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .custom-table th {
            background-color: #0ea5e9;
            color: white;
        }

        .custom-table tr:nth-child(even) {
            background-color: #f8fafc;
        }

        .custom-table tr:hover {
            background-color: #e0f2fe;
        }

        .upload-zone {
            border: 2px dashed #7dd3fc;
            background: linear-gradient(135deg, #f0f9ff 0%, #eff6ff 100%);
        }

        .upload-zone.dragover {
            border-color: #0284c7;
            background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

            </div>
            <div class="bg-slate-700/50 px-4 py-2 rounded-full border border-slate-600 flex items-center gap-2">

        let currentDamData = [];

        let detectedDamMatch = null;
        let referenceImageData = [];
        let detectionReady = false;
        let selectedRegion = "All Regions";

        function getRandomMonths(min, max) {
            return (Math.random() * (max - min) + min).toFixed(1);
        }

        function slugifyDamName(name) {
            return name.toLowerCase().replace(/\s+/g, "");
        }

        function getDamImagePath(dam) {
            return `images/${slugifyDamName(dam.name)}.png`;
        }

        function getUniqueRegions() {
            return ["All Regions", ...new Set(currentDamData.map((dam) => dam.region))];
        }

        function getDamsByRegion(region) {
            return region === "All Regions" ? currentDamData : currentDamData.filter((dam) => dam.region === region);
        }

        function getDamStatusLabel(storage) {
            if (storage >= 98.5) return { label: "Excellent", classes: "bg-emerald-100 text-emerald-700" };
            if (storage >= 97) return { label: "Stable", classes: "bg-blue-100 text-blue-700" };
            return { label: "Watch", classes: "bg-amber-100 text-amber-700" };
        }

        function getSupplyRisk(monthsRemaining) {
            const months = parseFloat(monthsRemaining);
            if (months >= 12) return "Low";
            if (months >= 10.5) return "Moderate";
            return "Elevated";
        }

        async function fetchDamData() {
            const generateMockData = () => {
                return PUNE_DAMS.map((dam) => ({
                    ...dam,
                    storage: (Math.random() * (100 - 96) + 96).toFixed(1),
                    monthsRemaining: getRandomMonths(10, 13)
                }));
            };

            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve(generateMockData());
                }, 800);
            });
        }

        async function extractImageSignature(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d", { willReadFrequently: true });
                    const size = 32;
                    canvas.width = size;
                    canvas.height = size;
                    ctx.drawImage(img, 0, 0, size, size);
                    const { data } = ctx.getImageData(0, 0, size, size);
                    const signature = [];

                    for (let i = 0; i < data.length; i += 16) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        signature.push((r + g + b) / 3);
                    }

                    resolve(signature);
                };
                img.onerror = reject;
                img.src = src;
            });
        }

        function compareSignatures(first, second) {
            let totalDifference = 0;
            for (let i = 0; i < first.length; i += 1) {
                totalDifference += Math.abs(first[i] - second[i]);
            }
            const maxDifference = first.length * 255;
            return 1 - (totalDifference / maxDifference);
        }

        async function preloadDamReferenceImages() {
            referenceImageData = [];
            for (const dam of currentDamData) {
                try {
                    const signature = await extractImageSignature(getDamImagePath(dam));
                    referenceImageData.push({ name: dam.name, signature });
                } catch (error) {
                    console.warn(`Could not load reference image for ${dam.name}`, error);
                }
            }
            detectionReady = referenceImageData.length > 0;
        }

        function handleNav(view) {
            document.querySelectorAll(".nav-btn").forEach((btn) => btn.classList.remove("active"));
            document.getElementById(`btn-${view}`).classList.add("active");

            if (view === "home") renderHome();
            if (view === "prevention") renderPrevention();
            if (view === "leakage") renderLeakage();
            if (view === "finder") renderFinder();
        }

        async function init() {
            currentDamData = await fetchDamData();
            await preloadDamReferenceImages();
            handleNav("home");
        }

        async function renderHome() {
            const main = document.getElementById("main-content");

            if (currentDamData.length === 0) {
                main.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20">

                        <h2 class="text-xl font-semibold text-slate-700">Connecting to Water Grid...</h2>

                `;
                currentDamData = await fetchDamData();
                await preloadDamReferenceImages();
            }

            const regionOptions = getUniqueRegions();
            const filteredDams = getDamsByRegion(selectedRegion);
            const regionAverage = filteredDams.length > 0
                ? (filteredDams.reduce((acc, dam) => acc + Number(dam.storage), 0) / filteredDams.length).toFixed(1)
                : "0.0";

            const cardsHtml = filteredDams.map((dam) => {
                const index = currentDamData.findIndex((item) => item.name === dam.name);
                const status = getDamStatusLabel(Number(dam.storage));
                return `
                    <div onclick="renderAnalysis(${index})" class="bg-white rounded-2xl p-0 shadow-sm hover-card cursor-pointer border border-slate-100 overflow-hidden flex flex-col h-full">
                        <div class="h-48 overflow-hidden relative">

                            </div>
                            <p class="text-slate-500 text-sm mb-4 line-clamp-2">${dam.info}</p>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div class="bg-blue-50 p-3 rounded-lg text-center">
                                    <span class="block text-xs text-blue-400 font-semibold uppercase">Storage</span>
                                    <span class="block text-lg font-bold text-blue-700">${dam.storage}%</span>
                                </div>

                                    <span class="block text-xs text-green-400 font-semibold uppercase">Supply</span>
                                    <span class="block text-lg font-bold text-green-700">~${dam.monthsRemaining} mo</span>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50 border-t border-slate-100 text-center">
                            <span class="text-blue-500 font-semibold text-sm flex items-center justify-center gap-1 group">
                                View Analytics
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                </svg>

            const galleryHtml = filteredDams.map((dam) => `

                    </div>

            main.innerHTML = `

                            The Pune metropolitan water system is currently robust. With an aggregate storage capacity of

                            Calculated projections indicate uninterrupted supply for approximately

                            </div>

                            <div class="mt-6 flex flex-wrap gap-3">
                                <button onclick="renderAnalysis(${currentDamData.findIndex((item) => item.name === dam.name)})" class="bg-slate-900 hover:bg-slate-800 text-white px-5 py-3 rounded-2xl font-medium transition-colors">
                                    Open full analytics
                                </button>
                                <button onclick="setFinderRegion('${dam.region}')" class="bg-sky-50 hover:bg-sky-100 text-sky-700 px-5 py-3 rounded-2xl font-medium transition-colors">
                                    View region dams
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function setFinderRegion(region) {
            selectedRegion = region;
            renderFinder();
        }

        function setupUploadZoneEvents() {
            const zone = document.getElementById("upload-zone");
            if (!zone || zone.dataset.bound === "true") return;

            ["dragenter", "dragover"].forEach((eventName) => {
                zone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    zone.classList.add("dragover");
                });
            });

            ["dragleave", "drop"].forEach((eventName) => {
                zone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    zone.classList.remove("dragover");
                });
            });

            zone.addEventListener("drop", (event) => {
                const [file] = event.dataTransfer.files;
                if (file) processDamImageFile(file);
            });

            zone.dataset.bound = "true";
        }

        function handleDamImageUpload(event) {
            const [file] = event.target.files;
            if (file) processDamImageFile(file);
        }

        async function processDamImageFile(file) {
            if (!detectionReady) {
                alert("Reference images are still loading. Please try again in a moment.");
                return;
            }

            const preview = URL.createObjectURL(file);
            const signature = await extractImageSignature(preview);
            let bestMatch = null;

            for (const reference of referenceImageData) {
                const score = compareSignatures(signature, reference.signature);
                if (!bestMatch || score > bestMatch.score) {
                    bestMatch = { name: reference.name, score };
                }
            }

            detectedDamMatch = {
                name: bestMatch.name,
                confidence: Math.max(65, Math.round(bestMatch.score * 100)),
                preview
            };
            selectedRegion = currentDamData.find((dam) => dam.name === bestMatch.name)?.region || selectedRegion;
            renderFinder();
        }

        function setupAnalysisCharts(dam, dailyOutput) {
            const usageData = DAM_USAGE_DISTRIBUTION[dam.name] || [];

            if (globalBarChart) globalBarChart.destroy();
            if (globalPieChart) globalPieChart.destroy();

            const ctxBar = document.getElementById("barChart").getContext("2d");
            const ctxPie = document.getElementById("pieChart").getContext("2d");

            const labels = usageData.map((item) => item.area.split("(")[0].trim());
            const percentages = usageData.map((item) => item.usagePercent);
            const colors = usageData.map((item) => item.color);
            const monthlyVolumes = percentages.map((percentage) => ((dailyOutput * 30) * (percentage / 100)).toFixed(0));

            globalBarChart = new Chart(ctxBar, {
                type: "bar",
                data: {
                    labels,
                    datasets: [{
                        label: "Monthly Consumption (ML)",
                        data: monthlyVolumes,
                        backgroundColor: "#3b82f6",
                        borderRadius: 6,
                        barThickness: 30
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            globalPieChart = new Chart(ctxPie, {
                type: "doughnut",
                data: {
                    labels,
                    datasets: [{
                        data: percentages,
                        backgroundColor: colors,
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: "right", labels: { usePointStyle: true, boxWidth: 10 } }
                    }
                }
            });
        }

        function openModal(damName) {
            const modal = document.getElementById("usage-modal");
            const modalTitle = document.getElementById("modal-title");
            const legendContainer = document.getElementById("usage-legend");
            const ctxModal = document.getElementById("usage-pie-chart").getContext("2d");
            const usageData = DAM_USAGE_DISTRIBUTION[damName];

            modalTitle.innerText = `${damName} - Regional Breakdown`;
            modal.classList.remove("hidden");

            legendContainer.innerHTML = usageData.map((item) => `
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
                    <div class="flex items-center gap-3">
                        <span class="w-4 h-4 rounded-full" style="background-color: ${item.color}"></span>
                        <span class="text-sm font-medium text-slate-700">${item.area}</span>
                    </div>
                    <span class="font-bold text-slate-800">${item.usagePercent}%</span>
                </div>
            `).join("");

            if (globalModalChart) globalModalChart.destroy();

            globalModalChart = new Chart(ctxModal, {
                type: "pie",
                data: {
                    labels: usageData.map((item) => item.area),
                    datasets: [{
                        data: usageData.map((item) => item.usagePercent),
                        backgroundColor: usageData.map((item) => item.color),
                        borderWidth: 2,
                        borderColor: "#ffffff"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function closeModal() {
            document.getElementById("usage-modal").classList.add("hidden");
        }

        document.getElementById("usage-modal").addEventListener("click", function(event) {
            if (event.target === this) closeModal();
        });

        init();
    </script>
</body>
</html>
